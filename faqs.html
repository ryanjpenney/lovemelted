<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem('melted_age_ok')!=='1')document.documentElement.setAttribute('data-gate','');}catch(e){}</script>
<style>html[data-gate]{background:#0a0a0a}html[data-gate] body{visibility:hidden}</style>
<title>Melted — FAQs</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<section class="text-center pt-[56px] px-6">
  <h1 class="caslon text-[44px] md:text-[56px] text-black leading-[1.05]">Frequently Asked</h1>
  <p class="garamond text-[19px] text-[#666] mt-[14px]">Everything you need to know about Melted.</p>
</section>

<section class="max-w-[820px] mx-auto px-[28px] md:px-0 mt-[52px]" data-faq></section>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const faqs = [
    ["Where can I buy Melted?", "Melted is available at 30+ stores across Arizona, a growing number of dispensaries in Maryland, and is coming soon to Ohio. We're sold at Curaleaf and other partners — use our <a href='locations.html' class='underline'>store locator</a> to find the closest one to you."],
    ["Can you ship cannabis products to me?", "No — cannabis products are pickup-only at licensed dispensaries. Our merch is currently sold out and restocking soon via print-on-demand; direct-to-consumer shipping is on the way."],
    ["What makes your gummies different?", "Our Live Rosin Gummies are pressed from fresh-frozen flower — never distillate — for a rich, full-flavored experience that tastes like the plant it came from."],
    ["What is a Tigerstyle Cartridge?", "A 510-thread cartridge designed to deliver a rich, flower-like experience on the go. It pairs with any standard 510 battery."],
    ["Do I need to be 21?", "Yes. All Melted products are for use only by adults twenty-one years of age and older. Valid ID is required at every dispensary."],
    ["How do I become a partner or stock Melted?", "We’d love to hear from you. Reach out at <a href='mailto:info@studiobrands.cc' class='underline'>info@studiobrands.cc</a> or visit our <a href='about.html#join' class='underline'>Join Melted</a> page."]
  ];
  document.querySelector("[data-faq]").innerHTML = faqs.map(([q, a], i) => `
    <div class="border-t border-[#e6e6e6] ${i === faqs.length - 1 ? "border-b" : ""}">
      <button class="faq-q w-full flex items-center justify-between text-left py-[26px]" aria-expanded="false">
        <span class="caslon text-[22px] text-black pr-6">${q}</span>
        <svg class="faq-ic w-5 h-5 shrink-0 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <div class="faq-a hidden pb-[26px] -mt-[6px]"><p class="garamond text-[18px] text-[#555] leading-[1.7]">${a}</p></div>
    </div>`).join("");
  document.querySelectorAll(".faq-q").forEach(b => b.addEventListener("click", () => {
    const a = b.nextElementSibling, ic = b.querySelector(".faq-ic");
    const open = !a.classList.contains("hidden");
    a.classList.toggle("hidden"); ic.style.transform = open ? "rotate(0deg)" : "rotate(45deg)";
    b.setAttribute("aria-expanded", String(!open));
  }));
})();
</script>
</body>
</html>
