<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem('melted_age_ok')!=='1')document.documentElement.setAttribute('data-gate','');}catch(e){}</script>
<style>html[data-gate]{background:#0a0a0a}html[data-gate] body{visibility:hidden}</style>
<title>Melted — Store Locator</title>
<meta name="description" content="Find Melted at Curaleaf and other partner dispensaries across Arizona and Maryland, with Ohio coming soon. Search by ZIP for your nearest store on our interactive map.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }

  /* Map — sleek grayscale to match the brand */
  #map { background: #e9e9e6; }
  .leaflet-tile { filter: grayscale(100%) contrast(0.95) brightness(1.03); }
  .leaflet-container { font-family: 'Oswald', sans-serif; }
  .leaflet-popup-content-wrapper { border-radius: 0; box-shadow: 0 6px 24px rgba(0,0,0,.18); }
  .leaflet-popup-content { margin: 14px 16px; }

  /* Store markers */
  .m-marker span { display:block; width:16px; height:16px; border-radius:50%; background:#0a0a0a;
    border:2px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.45);
    transition:transform .18s ease, background-color .18s ease, box-shadow .18s ease; }
  .m-marker:hover span { transform:scale(1.2); }
  .m-marker.sel span { background:#0a0a0a; transform:scale(1.5);
    box-shadow:0 0 0 5px rgba(10,10,10,.30), 0 1px 6px rgba(0,0,0,.5); }
  .m-pin span { display:block; width:14px; height:14px; border-radius:50%; background:transparent;
    border:3px solid #0a0a0a; box-shadow:0 0 0 4px rgba(10,10,10,.18); }
  .m-soon span { display:block; width:16px; height:16px; border-radius:50%; background:#fff;
    border:2px dashed #0a0a0a; opacity:.85; }

  /* Store-card highlight + entrance animation on arrival */
  @keyframes m-rise { 0%{opacity:0; transform:translateY(12px);} 100%{opacity:1; transform:translateY(0);} }
  @keyframes m-pop  { 0%{box-shadow:0 0 0 0 rgba(10,10,10,.28);} 100%{box-shadow:0 0 0 16px rgba(10,10,10,0);} }
  .store-card { transition: border-color .2s ease, background-color .2s ease; }
  .store-row.flash { animation: m-rise .5s ease both; }
  .store-row.active .store-card { border-color:#0a0a0a; background:#fafafa; }
  .store-row.flash .store-card { animation: m-pop 1.2s ease 1; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<!-- Page hero -->
<section class="bg-[#0a0a0a] text-center py-[56px] px-6">
  <h1 class="caslon text-[44px] md:text-[56px] text-white leading-[1.05]">Find Melted Near You</h1>
  <p class="garamond text-[19px] text-[#bdbdbd] mt-[14px] max-w-[660px] mx-auto">Find Melted at Curaleaf and other partner dispensaries across <span class="text-white">Arizona</span> and <span class="text-white">Maryland</span> — with <span class="text-white">Ohio</span> coming soon. Search your ZIP to see your closest stores, ranked by distance.</p>
</section>

<!-- Search + region filter -->
<section class="max-w-[1280px] mx-auto px-[28px] md:px-[45px] -mt-[30px]">
  <form data-loc-form class="bg-white border border-[#e3e3e3] shadow-lg p-[10px] flex flex-col sm:flex-row gap-[10px]">
    <input data-loc-zip inputmode="numeric" maxlength="5" placeholder="Enter your ZIP code" class="oswald flex-1 outline-none px-5 py-4 text-[16px] tracking-[0.05em] border border-transparent focus:border-[#ddd]">
    <button type="submit" class="oswald bg-black text-white text-[13px] font-medium tracking-[0.1em] uppercase px-8 py-4 hover:bg-[#333] transition-colors">Search</button>
  </form>
  <div class="flex items-center gap-2 mt-[16px] flex-wrap" data-region-chips></div>
  <p data-loc-msg class="garamond text-[15px] mt-[10px] min-h-[20px]"></p>
</section>

<!-- Map + list -->
<section class="max-w-[1280px] mx-auto px-[28px] md:px-[45px] mt-[20px] pb-[20px]">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-[36px]">
    <!-- List -->
    <div>
      <div class="flex items-center justify-between mb-[14px]">
        <h2 data-loc-heading class="oswald text-[14px] font-medium tracking-[0.1em] uppercase text-black">All Locations</h2>
        <span data-loc-count class="garamond text-[15px] text-[#888]"></span>
      </div>
      <div data-loc-results class="space-y-[12px] md:max-h-[620px] md:overflow-y-auto md:pr-[10px]"></div>
    </div>
    <!-- Map -->
    <div class="md:sticky md:top-[90px] h-[400px] md:h-[640px] order-first md:order-last">
      <div id="map" class="w-full h-full border border-[#e3e3e3]"></div>
    </div>
  </div>
</section>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const M = window.MELTED;
  const input = document.querySelector("[data-loc-zip]");
  const msg = document.querySelector("[data-loc-msg]");
  const heading = document.querySelector("[data-loc-heading]");
  const count = document.querySelector("[data-loc-count]");
  const results = document.querySelector("[data-loc-results]");
  const chipWrap = document.querySelector("[data-region-chips]");

  const states = [...new Set(M.STORES.map(s => s.state))];
  let region = "AZ";          // initial view: Arizona
  let sortZip = null;         // when set, list is ranked by distance across all states
  let activeZip = null;       // currently highlighted store

  /* ---- Map ---- */
  const map = L.map("map", { scrollWheelZoom: false, zoomControl: true }).setView([34.4, -111.7], 6);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: "abcd", maxZoom: 19
  }).addTo(map);

  const markers = {};
  M.STORES.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: icon(false), title: s.name });
    m.bindPopup(`<strong style="font-weight:600;letter-spacing:.04em;text-transform:uppercase">${s.name}</strong><br><span style="font-family:'EB Garamond',serif;font-size:14px;color:#555">${s.addr}</span>`);
    m.on("click", () => selectStore(s.zip, { pan: false, flash: false }));
    markers[s.zip] = m;
  });
  let searchPin = null;

  // Coming-soon markers (e.g., Ohio)
  const SOON_STATES = [...new Set(M.COMING_SOON.map(c => c.state))];
  const soonMarkers = M.COMING_SOON.map(c => {
    const m = L.marker([c.lat, c.lng], { icon: L.divIcon({ className: "m-soon", html: "<span></span>", iconSize: [16, 16], iconAnchor: [8, 8] }) });
    m.bindPopup(`<strong style="font-weight:600;letter-spacing:.04em;text-transform:uppercase">${c.name}, ${c.state}</strong><br><span style="font-family:'EB Garamond',serif;font-size:14px;color:#555">Coming soon</span>`);
    return m;
  });
  function showSoon(on) { soonMarkers.forEach(m => { if (on) { if (!map.hasLayer(m)) m.addTo(map); } else if (map.hasLayer(m)) map.removeLayer(m); }); }

  function icon(sel) { return L.divIcon({ className: "m-marker" + (sel ? " sel" : ""), html: "<span></span>", iconSize: [16, 16], iconAnchor: [8, 8] }); }

  /* ---- Region chips ---- */
  function renderChips() {
    const chip = (key, label) =>
      `<button data-region="${key}" class="oswald text-[11px] tracking-[0.08em] uppercase px-[16px] py-[8px] border transition-colors ${region === key ? "bg-black text-white border-black" : "bg-white text-[#555] border-[#d8d8d8] hover:border-black"}">${label}</button>`;
    chipWrap.innerHTML = chip("all", "All") + states.map(s => chip(s, M.STATE_NAMES[s] || s)).join("")
      + SOON_STATES.map(s => chip(s, (M.STATE_NAMES[s] || s) + " · Soon")).join("");
    chipWrap.querySelectorAll("[data-region]").forEach(b => b.addEventListener("click", () => {
      region = b.dataset.region; sortZip = null; input.value = ""; msg.textContent = "";
      render(); fitToVisible();
    }));
  }

  /* ---- Which stores are visible ---- */
  function visibleStores() {
    if (sortZip) return M.nearestStores(sortZip);                 // ranked, all states
    if (region === "all") return M.STORES.slice();
    return M.STORES.filter(s => s.state === region);
  }

  /* ---- Render list + markers ---- */
  function render() {
    const ranked = !!sortZip;

    // Coming-soon region (e.g., Ohio) — no live stores yet
    if (!ranked && SOON_STATES.includes(region)) {
      const cities = M.COMING_SOON.filter(c => c.state === region);
      heading.textContent = M.STATE_NAMES[region] + " — Coming Soon";
      count.textContent = "Coming soon";
      results.innerHTML = `<div class="border border-dashed border-[#cbcbcb] p-[26px]">
        <p class="oswald text-[12px] tracking-[0.1em] uppercase text-[#999]">Coming soon to ${M.STATE_NAMES[region]}</p>
        <p class="garamond text-[18px] text-[#444] leading-[1.65] mt-2">We're expanding into ${M.STATE_NAMES[region]} — ${cities.map(c => c.name).join(", ")} and more on the way. Check back soon.</p>
      </div>`;
      M.STORES.forEach(s => { if (map.hasLayer(markers[s.zip])) map.removeLayer(markers[s.zip]); });
      showSoon(true);
      const pts = cities.map(c => [c.lat, c.lng]);
      if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.5));
      renderChips();
      return;
    }

    const list = visibleStores();
    heading.textContent = ranked ? "Stores nearest " + sortZip
      : (region === "all" ? "All Locations" : M.STATE_NAMES[region] + " Locations");
    count.textContent = list.length + " location" + (list.length === 1 ? "" : "s");

    results.innerHTML = list.map((s, i) => row(s, ranked, i === 0 && ranked)).join("");

    // markers: show only visible set
    const showZips = new Set(list.map(s => s.zip));
    M.STORES.forEach(s => {
      const m = markers[s.zip];
      if (showZips.has(s.zip)) { if (!map.hasLayer(m)) m.addTo(map); }
      else if (map.hasLayer(m)) map.removeLayer(m);
    });
    showSoon(ranked || region === "all");   // surface upcoming markets in broad views
    if (ranked) selectStore(list[0].zip, { pan: false, flash: false, scroll: false });
    wireRows();
    renderChips();
  }

  function row(s, ranked, isClosest) {
    const dist = ranked ? `<p class="oswald text-[16px] font-medium leading-none">${s.dist.toFixed(1)}<span class="text-[11px] text-[#999]"> mi</span></p>` : "";
    const tag = isClosest ? ' <span class="oswald text-[9px] tracking-[0.08em] uppercase bg-black text-white px-1.5 py-0.5 align-middle ml-1">Closest</span>' : "";
    const stateTag = `<span class="oswald text-[10px] tracking-[0.08em] uppercase text-[#aaa] ml-2">${M.STATE_NAMES[s.state] || s.state}</span>`;
    return `<div class="store-row" data-zip="${s.zip}">
      <div class="store-card border border-[#e6e6e6] hover:border-[#bbb] p-[20px] flex items-start justify-between gap-4 cursor-pointer" data-card>
        <div>
          <p class="oswald text-[16px] font-medium tracking-[0.02em] uppercase text-black">${s.name}${tag}${stateTag}</p>
          <p class="garamond text-[16px] text-[#666] mt-[6px]">${s.addr}</p>
          ${s.phone ? `<p class="garamond text-[15px] text-[#999] mt-[2px]"><a href="tel:${s.phone.replace(/\D/g,"")}" data-stop class="hover:text-black">${s.phone}</a></p>` : ""}
          <div class="mt-[10px] flex gap-4">
            <a href="https://maps.google.com/?q=${encodeURIComponent(s.name + ", " + s.addr)}" target="_blank" rel="noopener" data-stop class="oswald text-[10px] tracking-[0.08em] uppercase border-b border-black hover:opacity-60">Directions</a>
            <button type="button" data-set="${s.zip}" data-stop class="oswald text-[10px] tracking-[0.08em] uppercase text-[#999] hover:text-black border-b border-transparent hover:border-black">Set as my store</button>
          </div>
        </div>
        <div class="text-right shrink-0">${dist}</div>
      </div>
    </div>`;
  }

  function wireRows() {
    results.querySelectorAll(".store-row").forEach(rowEl => {
      const zip = rowEl.dataset.zip;
      rowEl.querySelector("[data-card]").addEventListener("click", e => {
        if (e.target.closest("[data-stop]")) return;       // let links/buttons act normally
        selectStore(zip, { pan: true, flash: false });
      });
      const setBtn = rowEl.querySelector("[data-set]");
      if (setBtn) setBtn.addEventListener("click", () => {
        M.setZip(zip); input.value = zip;
        msg.textContent = "Saved as your store."; msg.className = "garamond text-[15px] mt-[10px] min-h-[20px] text-black";
      });
    });
  }

  /* ---- Select / highlight a store ---- */
  function selectStore(zip, opts) {
    opts = opts || {};
    activeZip = zip;
    Object.keys(markers).forEach(z => markers[z].setIcon(icon(z === zip)));
    if (markers[zip] && map.hasLayer(markers[zip]) && opts.pan) map.setView(markers[zip].getLatLng(), Math.max(map.getZoom(), 11), { animate: true });
    document.querySelectorAll(".store-row").forEach(r => r.classList.remove("active"));
    const rowEl = results.querySelector(`.store-row[data-zip="${zip}"]`);
    if (rowEl) {
      rowEl.classList.add("active");
      if (opts.flash) { rowEl.classList.remove("flash"); void rowEl.offsetWidth; rowEl.classList.add("flash"); }
      if (opts.scroll !== false) rowEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }
    if (markers[zip] && map.hasLayer(markers[zip]) && opts.pan) markers[zip].openPopup();
  }

  /* ---- Fit map to visible markers ---- */
  function fitToVisible(extra) {
    const list = visibleStores();
    const pts = list.map(s => [s.lat, s.lng]);
    if (extra) pts.push(extra);
    if (pts.length === 1) map.setView(pts[0], 11);
    else if (pts.length > 1) map.fitBounds(L.latLngBounds(pts).pad(0.18));
  }

  /* ---- ZIP search ---- */
  document.querySelector("[data-loc-form]").addEventListener("submit", e => {
    e.preventDefault();
    const z = input.value.trim();
    if (!M.validZip(z)) { msg.textContent = "Please enter a 5-digit ZIP code."; msg.className = "garamond text-[15px] mt-[10px] min-h-[20px] text-[#c0392b]"; return; }
    const c = M.zipCoords(z);
    if (!c) {
      const st = M.zipStateAbbr(z);
      if (st === "OH") {                       // Ohio — coming soon
        region = "OH"; sortZip = null; render();
        msg.textContent = "Melted is coming soon to Ohio — hang tight, it won't be long!"; msg.className = "garamond text-[15px] mt-[10px] min-h-[20px] text-[#9a6b1f]";
        return;
      }
      if (st === "AZ" || st === "MD") {         // in a state we serve, just not near a known ZIP
        region = st; sortZip = null; render(); fitToVisible();
        msg.textContent = "We're in " + (M.STATE_NAMES[st] || st) + " — here are all our stores in the state."; msg.className = "garamond text-[15px] mt-[10px] min-h-[20px] text-[#444]";
        return;
      }
      const name = M.zipStateName(z);
      msg.textContent = name
        ? "We're not in " + name + " yet — but hopefully soon! For now you'll find Melted across Arizona and Maryland, with Ohio coming next."
        : "We couldn't place that ZIP. Melted is in Arizona and Maryland, with Ohio coming soon.";
      msg.className = "garamond text-[15px] mt-[10px] min-h-[20px] text-[#9a6b1f]";
      return;
    }
    M.setZip(z); msg.textContent = "";
    sortZip = z; region = "all";
    render();
    // drop a search pin and frame it with the nearest stores
    if (searchPin) map.removeLayer(searchPin);
    searchPin = L.marker(c, { icon: L.divIcon({ className: "m-pin", html: "<span></span>", iconSize: [14, 14], iconAnchor: [7, 7] }) }).addTo(map);
    const near = M.nearestStores(z, 3).map(s => [s.lat, s.lng]);
    map.fitBounds(L.latLngBounds([c, ...near]).pad(0.25));
  });

  /* ---- Two-way sync with the global header ZIP input ---- */
  document.addEventListener("melted:zip", e => {
    const z = e.detail || "";
    if (!z || z === input.value || !M.validZip(z)) return;   // ignore our own updates / invalid
    input.value = z;
    document.querySelector("[data-loc-form]").requestSubmit();  // runs the same search the form does
  });

  /* ---- Init ---- */
  renderChips();
  render();

  const params = new URLSearchParams(location.search);
  const wantStore = params.get("store");
  const savedZip = M.getZip();

  setTimeout(() => {
    map.invalidateSize();
    if (wantStore && markers[wantStore]) {
      const s = M.STORES.find(x => x.zip === wantStore);
      region = s.state; sortZip = null; render();
      selectStore(wantStore, { pan: true, flash: true });
    } else if (savedZip && M.validZip(savedZip) && M.zipCoords(savedZip)) {
      input.value = savedZip; sortZip = savedZip; region = "all"; render();
      const c = M.zipCoords(savedZip);
      searchPin = L.marker(c, { icon: L.divIcon({ className: "m-pin", html: "<span></span>", iconSize: [14, 14], iconAnchor: [7, 7] }) }).addTo(map);
      const near = M.nearestStores(savedZip, 3).map(s => [s.lat, s.lng]);
      map.fitBounds(L.latLngBounds([c, ...near]).pad(0.25));
    } else {
      fitToVisible();
    }
  }, 200);
})();
</script>
</body>
</html>
