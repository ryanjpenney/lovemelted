<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melted — Store Locator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<!-- Page hero -->
<section class="bg-[#0a0a0a] text-center py-[64px] px-6">
  <h1 class="caslon text-[44px] md:text-[56px] text-white leading-[1.05]">Find Melted Near You</h1>
  <p class="garamond text-[19px] text-[#bdbdbd] mt-[14px] max-w-[600px] mx-auto">Melted is stocked at Curaleaf dispensaries across Arizona. Enter your ZIP to see your closest stores, ranked by distance.</p>
</section>

<!-- Search -->
<section class="max-w-[1180px] mx-auto px-[28px] md:px-[45px] -mt-[34px]">
  <form data-loc-form class="bg-white border border-[#e3e3e3] shadow-lg p-[10px] flex flex-col sm:flex-row gap-[10px]">
    <input data-loc-zip inputmode="numeric" maxlength="5" placeholder="Enter your ZIP code" class="oswald flex-1 outline-none px-5 py-4 text-[16px] tracking-[0.05em] border border-transparent focus:border-[#ddd]">
    <button type="submit" class="oswald bg-black text-white text-[13px] font-medium tracking-[0.1em] uppercase px-8 py-4 hover:bg-[#333] transition-colors">Search</button>
  </form>
  <p data-loc-msg class="garamond text-[15px] mt-[12px] min-h-[20px] text-center"></p>
</section>

<!-- Results -->
<section class="max-w-[1180px] mx-auto px-[28px] md:px-[45px] mt-[24px] pb-[20px]">
  <div class="flex items-center justify-between mb-[20px]">
    <h2 data-loc-heading class="oswald text-[14px] font-medium tracking-[0.1em] uppercase text-black">All Arizona Locations</h2>
    <span data-loc-count class="garamond text-[15px] text-[#888]"></span>
  </div>
  <div data-loc-results class="grid grid-cols-1 md:grid-cols-2 gap-x-[40px] gap-y-[6px]"></div>
</section>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const M = window.MELTED;
  const input = document.querySelector("[data-loc-zip]");
  const msg = document.querySelector("[data-loc-msg]");
  const heading = document.querySelector("[data-loc-heading]");
  const count = document.querySelector("[data-loc-count]");
  const results = document.querySelector("[data-loc-results]");

  function row(s, ranked) {
    const dist = ranked ? `<p class="oswald text-[16px] font-medium leading-none">${s.dist.toFixed(1)}<span class="text-[11px] text-[#999]"> mi</span></p>` : "";
    const closest = ranked && s._closest ? ' <span class="oswald text-[9px] tracking-[0.08em] uppercase bg-black text-white px-1.5 py-0.5 align-middle ml-1">Closest</span>' : "";
    return `<div class="border-t border-[#e6e6e6] py-[22px] flex items-start justify-between gap-4">
      <div>
        <p class="oswald text-[16px] font-medium tracking-[0.02em] uppercase text-black">${s.name}${closest}</p>
        <p class="garamond text-[16px] text-[#666] mt-[6px]">${s.addr}</p>
        <p class="garamond text-[15px] text-[#999] mt-[2px]"><a href="tel:${s.phone.replace(/\D/g,"")}" class="hover:text-black">${s.phone}</a></p>
        <div class="mt-[10px] flex gap-4">
          <a href="https://maps.google.com/?q=${encodeURIComponent(s.addr)}" target="_blank" rel="noopener" class="oswald text-[10px] tracking-[0.08em] uppercase border-b border-black hover:opacity-60">Directions</a>
          <button data-set="${s.zip}" class="oswald text-[10px] tracking-[0.08em] uppercase text-[#999] hover:text-black border-b border-transparent hover:border-black">Set as my store</button>
        </div>
      </div>
      <div class="text-right shrink-0">${dist}</div>
    </div>`;
  }

  function render(zip) {
    if (zip && M.validZip(zip) && M.zipCoords(zip)) {
      const near = M.nearestStores(zip);
      near[0]._closest = true;
      heading.textContent = "Stores nearest " + zip;
      count.textContent = near.length + " locations";
      results.innerHTML = near.map(s => row(s, true)).join("");
    } else {
      heading.textContent = "All Arizona Locations";
      count.textContent = M.STORES.length + " locations";
      results.innerHTML = M.STORES.map(s => row(s, false)).join("");
    }
    results.querySelectorAll("[data-set]").forEach(b =>
      b.addEventListener("click", () => { M.setZip(b.dataset.set); input.value = b.dataset.set; msg.textContent = "Saved as your store."; msg.className = "garamond text-[15px] mt-[12px] min-h-[20px] text-center text-[#3a7d44]"; render(b.dataset.set); window.scrollTo({ top: 0, behavior: "smooth" }); }));
  }

  document.querySelector("[data-loc-form]").addEventListener("submit", e => {
    e.preventDefault();
    const z = input.value.trim();
    if (!M.validZip(z)) { msg.textContent = "Please enter a 5-digit ZIP code."; msg.className = "garamond text-[15px] mt-[12px] min-h-[20px] text-center text-[#c0392b]"; return; }
    if (!M.zipCoords(z)) { msg.textContent = "We’re Arizona-only for now — try an AZ ZIP code."; msg.className = "garamond text-[15px] mt-[12px] min-h-[20px] text-center text-[#c0392b]"; return; }
    M.setZip(z);
    msg.textContent = ""; render(z);
  });

  // Initialize from saved ZIP
  const saved = M.getZip();
  if (saved) input.value = saved;
  render(saved);
})();
</script>
</body>
</html>
