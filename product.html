<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem('melted_age_ok')!=='1')document.documentElement.setAttribute('data-gate','');}catch(e){}</script>
<style>html[data-gate]{background:#0a0a0a}html[data-gate] body{visibility:hidden}</style>
<title>Melted — Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<main class="max-w-[1275px] mx-auto px-[28px] md:px-[45px] pt-[40px]">
  <nav aria-label="Breadcrumb" class="oswald text-[11px] tracking-[0.08em] uppercase text-[#767676] mb-[28px]">
    <a href="index.html" class="inline-block py-[12px] -my-[12px] hover:text-black">Home</a> <span class="mx-2">/</span>
    <a href="products.html" class="inline-block py-[12px] -my-[12px] hover:text-black" data-crumb-cat>Products</a> <span class="mx-2">/</span>
    <span class="text-black" data-crumb-name>Product</span>
  </nav>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-[40px] md:gap-[64px]">
    <!-- Gallery -->
    <div>
      <div class="bg-[#f6f6f4] aspect-square overflow-hidden">
        <img data-gallery-main src="" alt="" class="w-full h-full object-cover">
      </div>
      <div data-gallery-thumbs class="grid grid-cols-4 gap-[12px] mt-[12px]"></div>
    </div>

    <!-- Info -->
    <div class="md:pt-[6px]">
      <p data-p-badge class="oswald text-[11px] tracking-[0.14em] uppercase text-[#767676] mb-[10px] hidden"></p>
      <h1 data-p-name class="caslon text-[42px] md:text-[48px] leading-[1.08] text-black"></h1>
      <p data-p-spec class="oswald text-[12px] tracking-[0.1em] uppercase text-[#767676] mt-[12px]"></p>
      <p class="garamond text-[16px] text-[#767676] mt-[16px]">Pricing varies by dispensary.</p>
      <p data-p-detail class="garamond text-[19px] text-[#555] leading-[1.7] mt-[20px]"></p>

      <div data-p-flavors class="mt-[26px] hidden">
        <p class="oswald text-[11px] tracking-[0.12em] uppercase text-[#767676]">Flavors</p>
        <div data-flavor-list class="flex flex-wrap gap-[10px] mt-[12px]"></div>
      </div>

      <ul data-p-facts class="garamond text-[17px] text-[#444] mt-[24px] space-y-[10px]"></ul>

      <!-- Availability -->
      <div data-buy class="mt-[36px]"></div>

      <a href="locations.html" class="oswald inline-block text-[12px] tracking-[0.08em] uppercase text-[#767676] mt-[8px] pt-[12px] pb-[2px] border-b border-[#ccc] hover:text-black hover:border-black transition-colors">Browse all dispensaries →</a>
    </div>
  </div>

  <!-- You may also like -->
  <section class="mt-[100px]">
    <h2 class="oswald text-[20px] font-medium tracking-[0.06em] uppercase text-black text-center">You may also like</h2>
    <div data-related class="grid grid-cols-2 md:grid-cols-3 gap-x-[30px] gap-y-[36px] mt-[36px] max-w-[980px] mx-auto"></div>
  </section>
</main>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const M = window.MELTED;
  const params = new URLSearchParams(location.search);
  let id = params.get("id");
  if (!id || !M.PRODUCTS[id]) id = "live-rosin-gummies";
  const p = M.PRODUCTS[id];

  document.title = "Melted — " + p.name;
  document.querySelector("[data-crumb-name]").textContent = p.name;
  const cat = document.querySelector("[data-crumb-cat]");
  if (p.kind === "merch") { cat.textContent = "Merch"; cat.href = "merch.html"; }
  else { cat.textContent = "Products"; cat.href = "products.html"; }

  // Gallery (hide thumbnails when only one image)
  const main = document.querySelector("[data-gallery-main]");
  main.src = p.gallery[0]; main.alt = p.name;
  const thumbs = document.querySelector("[data-gallery-thumbs]");
  if (p.gallery.length > 1) {
    thumbs.innerHTML = p.gallery.map((src, i) =>
      `<button class="thumb aspect-square bg-[#f6f6f4] overflow-hidden border-2 ${i === 0 ? "border-black" : "border-transparent"}" data-i="${i}" aria-label="View image ${i + 1} of ${p.gallery.length}" aria-pressed="${i === 0}">
         <img src="${src}" alt="${p.name} view ${i + 1}" class="w-full h-full object-cover"></button>`).join("");
    thumbs.querySelectorAll(".thumb").forEach(btn => btn.addEventListener("click", () => {
      main.src = p.gallery[+btn.dataset.i];
      thumbs.querySelectorAll(".thumb").forEach(b => { b.classList.replace("border-black", "border-transparent"); b.setAttribute("aria-pressed", "false"); });
      btn.classList.replace("border-transparent", "border-black");
      btn.setAttribute("aria-pressed", "true");
    }));
  } else { thumbs.remove(); }

  // Info
  const badge = document.querySelector("[data-p-badge]");
  if (p.soldout) { badge.textContent = "Sold Out"; badge.classList.remove("hidden"); }
  else if (p.badge) { badge.textContent = p.badge; badge.classList.remove("hidden"); }
  document.querySelector("[data-p-name]").textContent = p.name;
  document.querySelector("[data-p-spec]").textContent = p.spec;
  document.querySelector("[data-p-detail]").textContent = p.detail;
  document.querySelector("[data-p-facts]").innerHTML = p.facts.map(f =>
    `<li class="flex gap-2"><span class="text-black">—</span><span>${f}</span></li>`).join("");

  // Flavors
  if (p.flavors && p.flavors.length) {
    document.querySelector("[data-p-flavors]").classList.remove("hidden");
    document.querySelector("[data-flavor-list]").innerHTML = p.flavors.map(f =>
      `<span class="garamond text-[15px] text-[#333] border border-[#ddd] px-[14px] py-[6px]">${f}</span>`).join("");
  }

  // "Order for pickup or delivery" — dispensary menu deep-links (menuLinks in melted.js)
  const buy = document.querySelector("[data-buy]");
  const links = p.menuLinks || {};
  const orderStores = Object.keys(links)
    .map(z => M.STORES.find(s => s.zip === z))
    .filter(Boolean);
  if (p.kind !== "merch" && orderStores.length) {
    const order = document.createElement("div");
    order.className = "border border-black mb-[16px]";
    order.innerHTML = `
      <div class="oswald text-[12px] font-medium tracking-[0.08em] uppercase py-[16px] text-center border-b border-[#e3e3e3] bg-black text-white">Order for pickup or delivery</div>
      <div class="p-[24px]">
        <label for="order-store" class="oswald text-[11px] tracking-[0.12em] uppercase text-[#767676]">Choose your dispensary</label>
        <select id="order-store" class="oswald w-full border border-[#d4d4d4] focus:border-black outline-none px-4 py-3 text-[16px] md:text-[14px] tracking-[0.04em] uppercase bg-white rounded-none appearance-none mt-[10px]">
          ${orderStores.map(s => `<option value="${s.zip}">${s.name} — ${s.addr}</option>`).join("")}
        </select>
        <a data-order-link href="${links[orderStores[0].zip]}" target="_blank" rel="noopener"
           class="oswald block w-full bg-black text-white text-center text-[12px] font-medium tracking-[0.1em] uppercase px-6 py-[16px] mt-[14px] hover:bg-[#333] transition-colors">
          View at <span data-order-store-name>${orderStores[0].name}</span></a>
        <p class="garamond text-[13px] text-[#555] leading-[1.5] mt-[12px]">All sales are completed on the licensed dispensary's site. Valid ID required — 21+.</p>
      </div>`;
    buy.parentNode.insertBefore(order, buy);
    const sel = order.querySelector("#order-store");
    sel.addEventListener("change", () => {
      const s = orderStores.find(x => x.zip === sel.value);
      order.querySelector("[data-order-link]").href = links[s.zip];
      order.querySelector("[data-order-store-name]").textContent = s.name;
    });
  }
  if (p.kind === "merch") {
    buy.innerHTML = `<div class="border border-[#e3e3e3] p-[24px]">
      <p class="oswald text-[12px] tracking-[0.1em] uppercase text-[#767676]">Sold Out</p>
      <p class="garamond text-[17px] text-[#555] leading-[1.6] mt-2">Our merch is being restocked with print-on-demand — check back soon.</p>
    </div>`;
  } else {
    buy.innerHTML = `<div class="border border-[#e3e3e3]">
      <div class="oswald text-[12px] font-medium tracking-[0.08em] uppercase py-[16px] text-center border-b border-[#e3e3e3] bg-[#fafafa]">Find it at a dispensary</div>
      <div class="p-[24px]">
        <p class="garamond text-[17px] text-[#555] leading-[1.6]">Enter your ZIP to find the closest dispensary carrying Melted.</p>
        <form data-store-form class="mt-[16px] flex gap-2">
          <input data-store-zip inputmode="numeric" maxlength="5" placeholder="ZIP code" class="oswald flex-1 min-w-0 border border-[#d4d4d4] focus:border-black outline-none px-4 py-3 text-[16px] tracking-[0.05em]">
          <button type="submit" class="oswald bg-black text-white text-[12px] font-medium tracking-[0.08em] uppercase px-6 hover:bg-[#333] transition-colors">Find</button>
        </form>
        <div data-store-result class="mt-[16px]"></div>
      </div>
    </div>`;
    const saved = M.getZip();
    if (saved) buy.querySelector("[data-store-zip]").value = saved;
    buy.querySelector("[data-store-form]").addEventListener("submit", e => {
      e.preventDefault();
      const z = buy.querySelector("[data-store-zip]").value.trim();
      const out = buy.querySelector("[data-store-result]");
      if (!M.validZip(z)) { out.innerHTML = `<p class="garamond text-[15px] text-[#c0392b]">Enter a valid 5-digit ZIP code.</p>`; return; }
      if (!M.zipCoords(z)) { out.innerHTML = `<p class="garamond text-[15px] text-[#c0392b]">No store near that ZIP yet — we’re in Arizona &amp; Maryland, with Ohio coming soon.</p>`; return; }
      M.setZip(z);
      const near = M.nearestStores(z, 3);
      out.innerHTML = near.map((s, i) => `
        <div class="border-t border-[#eee] py-3 flex items-start justify-between gap-3 ${i === 0 ? "border-t-0" : ""}">
          <div>
            <p class="garamond text-[17px] text-black">${s.name}${i === 0 ? ' <span class="oswald text-[9px] tracking-[0.08em] uppercase bg-black text-white px-1.5 py-0.5 align-middle ml-1">Closest</span>' : ""}</p>
            <p class="garamond text-[14px] text-[#767676]">${s.addr}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="oswald text-[15px] font-medium">${s.dist.toFixed(1)}<span class="text-[11px] text-[#767676]"> mi</span></p>
            <a href="https://maps.google.com/?q=${encodeURIComponent(s.name + ", " + s.addr)}" target="_blank" rel="noopener" class="hit oswald inline-block text-[10px] tracking-[0.06em] uppercase pt-[8px] -mt-[8px] border-b border-black hover:opacity-60">Directions</a>
          </div>
        </div>`).join("");
    });
  }

  // Related
  const rel = Object.keys(M.PRODUCTS).filter(k => k !== id && M.PRODUCTS[k].kind === p.kind);
  const pool = rel.length >= 3 ? rel : Object.keys(M.PRODUCTS).filter(k => k !== id);
  document.querySelector("[data-related]").innerHTML = pool.slice(0, 3).map((k, i, arr) => {
    const q = M.PRODUCTS[k];
    // odd item count on the 2-col mobile grid: center the last card instead of leaving an orphan
    const center = (i === arr.length - 1 && arr.length % 2 === 1) ? " col-span-2 w-[calc(50%-15px)] justify-self-center md:col-span-1 md:w-auto" : "";
    return `<a href="product.html?id=${k}" class="text-center group block${center}">
      <div class="bg-[#f6f6f4] aspect-square overflow-hidden"><img src="${q.gallery[0]}" alt="${q.name}" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-300"></div>
      <p class="oswald text-[14px] font-medium uppercase tracking-[0.03em] mt-3 group-hover:opacity-60 transition-opacity">${q.name}</p>
      <p class="oswald text-[11px] text-[#767676] font-light tracking-[0.1em] uppercase mt-1">${q.soldout ? "Sold Out" : q.spec}</p>
    </a>`;
  }).join("");
})();
</script>
</body>
</html>
