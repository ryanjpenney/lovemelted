<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem('melted_age_ok')!=='1')document.documentElement.setAttribute('data-gate','');}catch(e){}</script>
<style>html[data-gate]{background:#0a0a0a}html[data-gate] body{visibility:hidden}</style>
<title>Melted — Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<main class="max-w-[1275px] mx-auto px-[28px] md:px-[45px] pt-[40px]">
  <nav aria-label="Breadcrumb" class="oswald text-[11px] tracking-[0.08em] uppercase text-[#767676] mb-[28px]">
    <a href="/" class="inline-block py-[12px] -my-[12px] hover:text-black">Home</a> <span class="mx-2">/</span>
    <a href="/products" class="inline-block py-[12px] -my-[12px] hover:text-black" data-crumb-cat>Products</a> <span class="mx-2">/</span>
    <span class="text-black" data-crumb-name>Product</span>
  </nav>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-[40px] md:gap-[64px]">
    <!-- Gallery -->
    <div>
      <div class="bg-[#f6f6f4] aspect-square overflow-hidden">
        <img data-gallery-main src="" alt="" class="w-full h-full object-cover">
      </div>
      <div data-gallery-thumbs class="grid grid-cols-4 gap-[12px] mt-[12px]"></div>
    </div>

    <!-- Info -->
    <div class="md:pt-[6px]">
      <p data-p-badge class="oswald text-[11px] tracking-[0.14em] uppercase text-[#767676] mb-[10px] hidden"></p>
      <h1 data-p-name class="caslon text-[42px] md:text-[48px] leading-[1.08] text-black"></h1>
      <p data-p-spec class="oswald text-[12px] tracking-[0.1em] uppercase text-[#767676] mt-[12px]"></p>
      <p class="garamond text-[16px] text-[#767676] mt-[16px]">Pricing varies by dispensary.</p>
      <p data-p-detail class="garamond text-[19px] text-[#555] leading-[1.7] mt-[20px]"></p>

      <div data-p-flavors class="mt-[26px] hidden">
        <p class="oswald text-[11px] tracking-[0.12em] uppercase text-[#767676]">Flavors</p>
        <div data-flavor-list class="flex flex-wrap gap-[10px] mt-[12px]"></div>
      </div>

      <ul data-p-facts class="garamond text-[17px] text-[#444] mt-[24px] space-y-[10px]"></ul>

      <!-- Availability -->
      <div data-buy class="mt-[36px]"></div>

      <a href="/locations" class="oswald inline-block text-[12px] tracking-[0.08em] uppercase text-[#767676] mt-[8px] pt-[12px] pb-[2px] border-b border-[#ccc] hover:text-black hover:border-black transition-colors">Browse all dispensaries →</a>
    </div>
  </div>

  <!-- You may also like -->
  <section class="mt-[100px]">
    <h2 class="oswald text-[20px] font-medium tracking-[0.06em] uppercase text-black text-center">You may also like</h2>
    <div data-related class="grid grid-cols-2 md:grid-cols-3 gap-x-[30px] gap-y-[36px] mt-[36px] max-w-[980px] mx-auto"></div>
  </section>
</main>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const M = window.MELTED;
  const params = new URLSearchParams(location.search);
  let id = params.get("id");
  if (!id || !M.PRODUCTS[id]) id = "live-rosin-gummies";
  const p = M.PRODUCTS[id];

  document.title = "Melted — " + p.name;
  // Canonical is per-product, so it's set here rather than statically in <head>
  const canon = document.createElement("link");
  canon.rel = "canonical"; canon.href = "https://lovemelted.com/product?id=" + encodeURIComponent(id);
  document.head.appendChild(canon);
  document.querySelector("[data-crumb-name]").textContent = p.name;
  const cat = document.querySelector("[data-crumb-cat]");
  if (p.kind === "merch") { cat.textContent = "Merch"; cat.href = "/merch"; }
  else { cat.textContent = "Products"; cat.href = "/products"; }

  // Gallery (hide thumbnails when only one image)
  const main = document.querySelector("[data-gallery-main]");
  main.src = p.gallery[0]; main.alt = p.name;
  const thumbs = document.querySelector("[data-gallery-thumbs]");
  if (p.gallery.length > 1) {
    thumbs.innerHTML = p.gallery.map((src, i) =>
      `<button class="thumb aspect-square bg-[#f6f6f4] overflow-hidden border-2 ${i === 0 ? "border-black" : "border-transparent"}" data-i="${i}" aria-label="View image ${i + 1} of ${p.gallery.length}" aria-pressed="${i === 0}">
         <img src="${src}" alt="${p.name} view ${i + 1}" class="w-full h-full object-cover"></button>`).join("");
    thumbs.querySelectorAll(".thumb").forEach(btn => btn.addEventListener("click", () => {
      main.src = p.gallery[+btn.dataset.i];
      thumbs.querySelectorAll(".thumb").forEach(b => { b.classList.replace("border-black", "border-transparent"); b.setAttribute("aria-pressed", "false"); });
      btn.classList.replace("border-transparent", "border-black");
      btn.setAttribute("aria-pressed", "true");
    }));
  } else { thumbs.remove(); }

  // Info
  const badge = document.querySelector("[data-p-badge]");
  if (p.soldout) { badge.textContent = "Sold Out"; badge.classList.remove("hidden"); }
  else if (p.badge) { badge.textContent = p.badge; badge.classList.remove("hidden"); }
  document.querySelector("[data-p-name]").textContent = p.name;
  document.querySelector("[data-p-spec]").textContent = p.spec;
  document.querySelector("[data-p-detail]").textContent = p.detail;
  document.querySelector("[data-p-facts]").innerHTML = p.facts.map(f =>
    `<li class="flex gap-2"><span class="text-black">—</span><span>${f}</span></li>`).join("");

  // Variants (flavors/strains): selecting one swaps the hero image and re-points each
  // store's Order Online link (exact variant URL when known, store menu otherwise,
  // "Not available at this store" when the variant is confirmed out of range there).
  const variants = p.variants || [];
  let selected = null;   // no default selection — product-level view until a flavor is tapped
  const flavorWrap = document.querySelector("[data-p-flavors]");
  const flavorList = document.querySelector("[data-flavor-list]");

  function applyVariantImage() {
    main.src = (selected && selected.img) || p.gallery[0];
    main.alt = p.name + (selected ? " — " + selected.label : "");
  }
  function renderChips() {
    flavorList.innerHTML = variants.map(v => {
      const on = !!(selected && v.key === selected.key);
      return `<button type="button" data-variant="${v.key}" aria-pressed="${on}"
        class="garamond text-[15px] px-[14px] py-[9px] border transition-colors ${on ? "bg-black text-white border-black" : "text-[#333] border-[#ddd] hover:border-black"}">${v.label}</button>`;
    }).join("");
    flavorList.querySelectorAll("[data-variant]").forEach(b => b.addEventListener("click", () => {
      const v = variants.find(x => x.key === b.dataset.variant);
      selected = (selected && selected.key === v.key) ? null : v;   // tap again to deselect
      applyVariantImage();
      renderChips();
      renderOrderRows();
    }));
  }
  if (variants.length) {
    flavorWrap.classList.remove("hidden");
    renderChips();
  } else if (p.flavors && p.flavors.length) {
    // static chips for products without variant data yet
    flavorWrap.classList.remove("hidden");
    flavorList.innerHTML = p.flavors.map(f =>
      `<span class="garamond text-[15px] text-[#333] border border-[#ddd] px-[14px] py-[6px]">${f}</span>`).join("");
  }

  // "Order for pickup at a dispensary" — partner stores with confirmed online menus
  // (STORES[].menu), narrowed to the stores that stock THIS product when the catalog
  // lists stockists. Hidden entirely while a product is out of production (pickup:false).
  const buy = document.querySelector("[data-buy]");
  let partners = [];
  let orderList = null;   // <ul> inside the order module; re-rendered when the variant or ZIP changes
  const city = s => s.addr.split(", ").slice(-2)[0] + ", " + s.state;
  const pickupPool = M.STORES.filter(s => s.menu && (!p.stockists || p.stockists.indexOf(s.id) !== -1));

  function rowHref(s) {
    const l = selected && selected.links ? selected.links[s.id] : undefined;
    if (l === null) return null;      // partner confirmed this variant is not stocked there
    return l || M.menuUrl(s, p);      // exact variant URL when known, else the store menu searching this product's listed name
  }
  function renderOrderRows() {
    if (!orderList) return;
    orderList.innerHTML = partners.map((s, i) => {
      const href = rowHref(s);
      const action = href
        ? `<a href="${href}" target="_blank" rel="noopener" class="hit oswald shrink-0 text-[12px] font-medium tracking-[0.08em] uppercase text-black pt-[10px] pb-[3px] border-b-2 border-black hover:opacity-60 transition-opacity">Order Online</a>`
        : `<span class="oswald shrink-0 text-[12px] font-light tracking-[0.08em] uppercase text-[#8a8a8a] pt-[10px] pb-[3px] text-right">Not available at this store</span>`;
      return `
        <li class="flex items-center justify-between gap-4 py-[14px] ${i === 0 ? "" : "border-t border-[#eee]"}">
          <div class="min-w-0">
            <p class="garamond text-[17px] text-black leading-[1.35]">${s.name}</p>
            <p class="oswald text-[11px] font-light tracking-[0.08em] uppercase text-[#767676] mt-[2px]">${city(s)}${typeof s.dist === "number" ? ` · ${s.dist.toFixed(1)} mi` : ""}</p>
          </div>
          ${action}
        </li>`;
    }).join("");
  }

  // Saved location + radius preference (header "Set Location" control — melted-loc.js).
  function getLocPref() {
    try {
      const p = JSON.parse(localStorage.getItem("melted_loc") || "null");
      return (p && typeof p.lat === "number" && typeof p.lng === "number" && p.radius) ? p : null;
    } catch (e) { return null; }
  }
  const rankAll = (lat, lng) => pickupPool
    .map(s => Object.assign({ dist: M.haversine(lat, lng, s.lat, s.lng) }, s))
    .sort((a, b) => a.dist - b.dist);

  // Rank this product's stockists by distance. With a saved location preference the
  // list is HARD-FILTERED to stores inside the chosen radius (out-of-range stores are
  // hidden entirely); otherwise it falls back to the legacy ZIP ranking.
  function rankPartners(zip) {
    const L = getLocPref();
    if (L) return rankAll(L.lat, L.lng).filter(s => s.dist <= L.radius).slice(0, 8);
    const c = zip && M.validZip(zip) ? M.zipCoords(zip) : null;
    if (!c) return pickupPool.slice(0, 5);
    return rankAll(c[0], c[1]).slice(0, 5);
  }

  if (p.kind !== "merch" && p.pickup !== false && pickupPool.length) {
    const order = document.createElement("div");
    order.className = "border border-black mb-[16px]";
    order.innerHTML = `
      <div class="oswald text-[12px] font-medium tracking-[0.08em] uppercase py-[16px] text-center bg-black text-white">Order for pickup at a dispensary</div>
      <div class="px-[24px] pt-[16px]">
        <form data-order-zip-form class="flex gap-2">
          <input data-order-zip inputmode="numeric" maxlength="5" placeholder="ZIP code" aria-label="ZIP code — find the nearest dispensary carrying this product" class="oswald flex-1 min-w-0 border border-[#d4d4d4] focus:border-black outline-none px-4 py-[10px] text-[16px] tracking-[0.05em]">
          <button type="submit" class="oswald bg-black text-white text-[12px] font-medium tracking-[0.08em] uppercase px-5 hover:bg-[#333] transition-colors">Find</button>
        </form>
        <p data-order-zip-msg role="status" class="garamond text-[13px] leading-[1.5] mt-[8px] min-h-[18px]"></p>
      </div>
      <ul data-order-rows class="px-[24px]"></ul>
      <p class="garamond text-[13px] text-[#555] leading-[1.5] px-[24px] pb-[16px] pt-[4px] border-t border-[#eee]">All sales are completed on the licensed dispensary's site. Valid ID required — 21+.</p>`;
    buy.parentNode.insertBefore(order, buy);
    orderList = order.querySelector("[data-order-rows]");
    const zipInput = order.querySelector("[data-order-zip]");
    const zipMsg = order.querySelector("[data-order-zip-msg]");

    function applyZip(z, quiet) {
      partners = rankPartners(z);
      renderOrderRows();
      zipMsg.style.color = "#555";
      const L = getLocPref();
      if (L) {   // radius preference set: message reflects the hard filter
        if (!partners.length) {
          const nearest = rankAll(L.lat, L.lng)[0];
          zipMsg.style.color = "#c0392b";
          zipMsg.textContent = "No dispensaries within " + L.radius + " mi of " + L.label + " carry this product" +
            (nearest ? " — the nearest is " + nearest.name + " (" + nearest.dist.toFixed(0) + " mi)" : "") +
            ". Widen your radius in the location menu (top right).";
        } else {
          zipMsg.textContent = "Showing " + partners.length + (partners.length === 1 ? " dispensary" : " dispensaries") +
            " within " + L.radius + " mi of " + L.label + ".";
        }
        return;
      }
      if (!z) { zipMsg.textContent = ""; return; }
      if (!M.validZip(z)) { if (!quiet) { zipMsg.style.color = "#c0392b"; zipMsg.textContent = "Enter a valid 5-digit ZIP code."; } else zipMsg.textContent = ""; return; }
      if (!M.zipCoords(z)) { zipMsg.style.color = "#c0392b"; zipMsg.textContent = "We couldn't place that ZIP — showing our partner stores instead."; return; }
      zipMsg.textContent = (partners[0] && partners[0].dist > 150)
        ? "Not carried near " + z + " yet — the closest stores are listed."
        : "Closest stores to " + z + " first.";
    }

    // Instant update: re-rank the moment a full 5-digit ZIP is typed (no submit needed).
    zipInput.addEventListener("input", () => {
      const z = zipInput.value.replace(/\D/g, "");
      if (zipInput.value !== z) zipInput.value = z;
      if (z.length === 5) { applyZip(z); if (M.zipCoords(z)) M.setZip(z); }
      else applyZip("", true);
    });
    order.querySelector("[data-order-zip-form]").addEventListener("submit", e => {
      e.preventDefault();
      const z = zipInput.value.trim();
      applyZip(z);
      if (M.validZip(z) && M.zipCoords(z)) M.setZip(z);
    });
    // Stay in sync when the ZIP is set elsewhere (header bar, brand locator below).
    document.addEventListener("melted:zip", e => {
      const z = e.detail || "";
      if (zipInput.value !== z) { zipInput.value = z; applyZip(z, true); }
    });
    // Re-filter when the location/radius preference changes (header control).
    document.addEventListener("melted:loc", () => applyZip(zipInput.value.trim(), true));

    const savedOrderZip = M.getZip();
    if (savedOrderZip) zipInput.value = savedOrderZip;
    applyZip(savedOrderZip, true);
  }
  if (p.kind === "merch") {
    buy.innerHTML = `<div class="border border-[#e3e3e3] p-[24px]">
      <p class="oswald text-[12px] tracking-[0.1em] uppercase text-[#767676]">Sold Out</p>
      <p class="garamond text-[17px] text-[#555] leading-[1.6] mt-2">Our merch is being restocked with print-on-demand — check back soon.</p>
    </div>`;
  } else {
    buy.innerHTML = `<div class="border border-[#e3e3e3]">
      <div class="oswald text-[12px] font-medium tracking-[0.08em] uppercase py-[16px] text-center border-b border-[#e3e3e3] bg-[#fafafa]">Find it at a dispensary</div>
      <div class="p-[24px]">
        <p class="garamond text-[17px] text-[#555] leading-[1.6]">Enter your ZIP to find the closest dispensary carrying Melted.</p>
        <form data-store-form class="mt-[16px] flex gap-2">
          <input data-store-zip inputmode="numeric" maxlength="5" placeholder="ZIP code" class="oswald flex-1 min-w-0 border border-[#d4d4d4] focus:border-black outline-none px-4 py-3 text-[16px] tracking-[0.05em]">
          <button type="submit" class="oswald bg-black text-white text-[12px] font-medium tracking-[0.08em] uppercase px-6 hover:bg-[#333] transition-colors">Find</button>
        </form>
        <div data-store-result class="mt-[16px]"></div>
      </div>
    </div>`;
    const saved = M.getZip();
    if (saved) buy.querySelector("[data-store-zip]").value = saved;
    buy.querySelector("[data-store-form]").addEventListener("submit", e => {
      e.preventDefault();
      const z = buy.querySelector("[data-store-zip]").value.trim();
      const out = buy.querySelector("[data-store-result]");
      if (!M.validZip(z)) { out.innerHTML = `<p class="garamond text-[15px] text-[#c0392b]">Enter a valid 5-digit ZIP code.</p>`; return; }
      if (!M.zipCoords(z)) { out.innerHTML = `<p class="garamond text-[15px] text-[#c0392b]">No store near that ZIP yet — we’re in Arizona &amp; Maryland, with Ohio coming soon.</p>`; return; }
      M.setZip(z);
      const near = M.nearestStores(z, 3);
      out.innerHTML = near.map((s, i) => `
        <div class="border-t border-[#eee] py-3 flex items-start justify-between gap-3 ${i === 0 ? "border-t-0" : ""}">
          <div>
            <p class="garamond text-[17px] text-black">${s.name}${i === 0 ? ' <span class="oswald text-[9px] tracking-[0.08em] uppercase bg-black text-white px-1.5 py-0.5 align-middle ml-1">Closest</span>' : ""}</p>
            <p class="garamond text-[14px] text-[#767676]">${s.addr}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="oswald text-[15px] font-medium">${s.dist.toFixed(1)}<span class="text-[11px] text-[#767676]"> mi</span></p>
            <a href="https://maps.google.com/?q=${encodeURIComponent(s.name + ", " + s.addr)}" target="_blank" rel="noopener" class="hit oswald inline-block text-[10px] tracking-[0.06em] uppercase pt-[8px] -mt-[8px] border-b border-black hover:opacity-60">Directions</a>
          </div>
        </div>`).join("");
    });
  }

  // Related
  const rel = Object.keys(M.PRODUCTS).filter(k => k !== id && M.PRODUCTS[k].kind === p.kind);
  const pool = rel.length >= 3 ? rel : Object.keys(M.PRODUCTS).filter(k => k !== id);
  document.querySelector("[data-related]").innerHTML = pool.slice(0, 3).map((k, i, arr) => {
    const q = M.PRODUCTS[k];
    // odd item count on the 2-col mobile grid: center the last card instead of leaving an orphan
    const center = (i === arr.length - 1 && arr.length % 2 === 1) ? " col-span-2 w-[calc(50%-15px)] justify-self-center md:col-span-1 md:w-auto" : "";
    return `<a href="/product?id=${k}" class="text-center group block${center}">
      <div class="bg-[#f6f6f4] aspect-square overflow-hidden"><img src="${q.gallery[0]}" alt="${q.name}" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-300"></div>
      <p class="oswald text-[14px] font-medium uppercase tracking-[0.03em] mt-3 group-hover:opacity-60 transition-opacity">${q.name}</p>
      <p class="oswald text-[11px] text-[#767676] font-light tracking-[0.1em] uppercase mt-1">${q.soldout ? "Sold Out" : q.spec}</p>
    </a>`;
  }).join("");
})();
</script>
</body>
</html>
