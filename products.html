<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem('melted_age_ok')!=='1')document.documentElement.setAttribute('data-gate','');}catch(e){}</script>
<style>html[data-gate]{background:#0a0a0a}html[data-gate] body{visibility:hidden}</style>
<title>Melted — Products</title>
<meta name="description" content="Melted's cannabis lineup: Live Resin Gummies, Live Rosin Gummies, Mini Melt infused pre-rolls, the Tiger Style cartridge, Tiger Style Pre-Roll, and Tiger Style THCa Diamonds. Premium, consistent, and crafted for everyone — at dispensaries across Arizona and Maryland, with Ohio coming soon.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  .oswald { font-family: 'Oswald', sans-serif; }
  .garamond { font-family: 'EB Garamond', serif; }
  .caslon { font-family: 'Libre Caslon Text', serif; }
  body { font-family: 'EB Garamond', serif; }
</style>
</head>
<body class="bg-white">

<div data-melted-header></div>

<main>
<!-- Hero -->
<section class="bg-[#0a0a0a] text-center py-[64px] px-6">
  <h1 class="caslon text-[44px] md:text-[56px] text-white leading-[1.05]">The Lineup</h1>
  <p class="garamond text-[19px] text-[#bdbdbd] mt-[14px] max-w-[640px] mx-auto">Premium, consistent cannabis crafted for everyone. Find Melted at dispensaries across Arizona and Maryland — with Ohio coming soon.</p>
  <a href="locations.html" class="oswald inline-block text-[12px] font-medium tracking-[0.1em] uppercase text-white border border-white px-[26px] py-[14px] mt-[28px] hover:bg-white hover:text-black active:bg-white active:text-black transition-colors">Find a Dispensary</a>
</section>

<!-- Products -->
<section class="max-w-[1275px] mx-auto px-[28px] md:px-[45px] mt-[64px]">
  <!-- Location-radius filter status (hidden until a location preference is saved) -->
  <div data-loc-note class="hidden max-w-[1000px] mx-auto mb-[32px] border border-[#e3e3e3] px-[18px] py-[13px] flex flex-wrap items-baseline justify-between gap-x-[16px] gap-y-[4px]">
    <p data-loc-note-text class="garamond text-[15px] text-[#333] leading-[1.5]"></p>
    <button type="button" data-loc-change class="oswald text-[11px] font-medium tracking-[0.12em] uppercase underline underline-offset-4 text-[#555] hover:text-black transition-colors">Change</button>
  </div>
  <div data-products-grid class="grid grid-cols-2 md:grid-cols-3 gap-x-[24px] md:gap-x-[30px] gap-y-[48px] max-w-[1000px] mx-auto"></div>
  <!-- Empty state: nothing carried inside the chosen radius -->
  <div data-loc-empty class="hidden max-w-[560px] mx-auto text-center py-[40px]">
    <p class="caslon text-[26px] leading-[1.25] text-black">No dispensaries in your radius carry Melted yet.</p>
    <p data-loc-empty-text class="garamond text-[17px] text-[#555] leading-[1.6] mt-[14px]"></p>
    <button type="button" data-loc-change class="oswald inline-block text-[12px] font-medium tracking-[0.1em] uppercase border border-black text-black px-[26px] py-[14px] mt-[26px] hover:bg-black hover:text-white transition-colors">Change location or radius</button>
  </div>
</section>

<!-- Cross-link to merch -->
<section class="text-center mt-[88px]">
  <p class="oswald text-[13px] tracking-[0.1em] uppercase text-[#767676]">Not here for the cannabis?</p>
  <a href="merch.html" class="oswald inline-block text-[13px] font-medium tracking-[0.08em] uppercase text-black mt-[4px] pt-[12px] border-b-2 border-black pb-[5px] hover:opacity-60 transition-opacity">Shop Melted merch</a>
</section>
</main>

<div data-melted-footer></div>

<script src="assets/melted.js"></script>
<script>
(function () {
  const P = window.MELTED.PRODUCTS;
  const ids = Object.keys(P).filter(k => P[k].kind === "product");
  document.querySelector("[data-products-grid]").innerHTML = ids.map((id, i) => {
    const p = P[id];
    const center = (i === ids.length - 1 && ids.length % 3 === 1) ? " md:col-start-2" : "";
    const badge = p.badge
      ? `<div class="h-[30px] text-center"><span class="garamond inline-block border border-[#bbbbbb] text-[#555555] text-[16px] leading-[22px] px-[10px] py-[1px]">${p.badge}</span></div>`
      : `<div class="h-[30px]"></div>`;
    return `<a href="product.html?id=${id}" data-pid="${id}" class="text-center group block${center}">
      ${badge}
      <div class="overflow-hidden bg-[#f6f6f4] aspect-square"><img src="${p.gallery[0]}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-300"></div>
      <p class="oswald text-[17px] font-medium leading-[1.5] mt-[16px] text-black uppercase tracking-[0.03em] group-hover:opacity-60 transition-opacity">${p.name}</p>
      <p class="garamond text-[17px] text-[#666] leading-[1.5] mt-[8px] md:px-[20px]">${p.tagline}</p>
      <p class="oswald text-[11px] text-[#767676] font-light tracking-[0.12em] uppercase mt-[12px]">${p.spec}</p>
    </a>`;
  }).join("");

  /* ---------- Location-radius filter ----------
     When a location + radius preference is saved (header "Set Location" control),
     hide any product that no in-radius dispensary carries. A product's carrying
     pool = stores with an online menu, narrowed by PRODUCTS[].stockists when the
     catalog lists them (same rule as product.html's order module). */
  const M = window.MELTED;
  function getLocPref() {
    try {
      const p = JSON.parse(localStorage.getItem("melted_loc") || "null");
      return (p && typeof p.lat === "number" && typeof p.lng === "number" && p.radius) ? p : null;
    } catch (e) { return null; }
  }
  function availableWithin(p, L) {
    return M.STORES
      .filter(s => s.menu && (!p.stockists || p.stockists.indexOf(s.id) !== -1))
      .some(s => M.haversine(L.lat, L.lng, s.lat, s.lng) <= L.radius);
  }
  const note = document.querySelector("[data-loc-note]");
  const noteText = document.querySelector("[data-loc-note-text]");
  const empty = document.querySelector("[data-loc-empty]");
  const emptyText = document.querySelector("[data-loc-empty-text]");

  function applyLocFilter() {
    const cards = document.querySelectorAll("[data-products-grid] [data-pid]");
    const L = getLocPref();
    if (!L) {
      cards.forEach(c => c.classList.remove("hidden"));
      note.classList.add("hidden");
      empty.classList.add("hidden");
      return;
    }
    let shown = 0;
    cards.forEach(c => {
      const ok = availableWithin(P[c.dataset.pid], L);
      c.classList.toggle("hidden", !ok);
      if (ok) shown++;
    });
    if (shown === 0) {
      note.classList.add("hidden");
      const nearest = M.STORES
        .filter(s => s.menu)
        .map(s => Object.assign({ dist: M.haversine(L.lat, L.lng, s.lat, s.lng) }, s))
        .sort((a, b) => a.dist - b.dist)[0];
      emptyText.textContent = "Nothing is stocked within " + L.radius + " mi of " + L.label +
        (nearest ? " — the nearest partner dispensary is " + nearest.name + ", " + nearest.dist.toFixed(0) + " mi away." : ".");
      empty.classList.remove("hidden");
    } else {
      empty.classList.add("hidden");
      noteText.textContent = "Showing products available within " + L.radius + " mi of " + L.label +
        " (" + shown + " of " + cards.length + ")." + (shown < cards.length ? " Products no nearby dispensary carries are hidden." : "");
      note.classList.remove("hidden");
    }
  }
  document.querySelectorAll("[data-loc-change]").forEach(b =>
    b.addEventListener("click", () => { if (window.MELTED_LOC) window.MELTED_LOC.open(); }));
  document.addEventListener("melted:loc", applyLocFilter);
  applyLocFilter();
})();
</script>
</body>
</html>
